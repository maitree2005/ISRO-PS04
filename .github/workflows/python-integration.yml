name: Python Integration Tests

on:
  workflow_dispatch: {}

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (with CPU PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          # install CPU-only torch wheels; if requirements.txt specifies torch this will skip
          python -m pip install --extra-index-url https://download.pytorch.org/whl/cpu torch torchvision || true

      - name: Run integration test
        env:
          RUN_INTEGRATION_TESTS: 1
        run: pytest -q tests/test_models_integration.py
